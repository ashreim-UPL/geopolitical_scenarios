name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install web deps
        run: npm install
        working-directory: apps/web

      - name: Lint web
        run: npm run lint
        working-directory: apps/web

      - name: Build web
        run: npm run build
        working-directory: apps/web

  api:
    name: API checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
        working-directory: apps/api

      - name: Run API tests
        run: pytest -q
        working-directory: apps/api

